services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boqnow
      POSTGRES_PASSWORD: boqnow
      POSTGRES_DB: boqnow
    ports:
      - '5432:5432'
    volumes:
      - boqnow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boqnow']
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  boqnow_pg:
